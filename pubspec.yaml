name: intern_final
description: "Social Connect - A modern social media platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0

  # State Management
  provider: ^6.1.5+1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  lottie: ^3.3.1

  # Media
  image_picker: ^1.2.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utilities
  timeago: ^3.7.1
  intl: ^0.20.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
